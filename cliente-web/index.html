<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PoliMarket - Terminal de Ventas</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: rgba(26, 31, 53, 0.7);
            --card-border: rgba(255, 255, 255, 0.1);
            --primary: #f43f5e;
            --primary-hover: #fb7185;
            --secondary: #3b82f6;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --success: #10b981;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background: radial-gradient(circle at top right, #1e1b4b, #0b0f19);
            color: var(--text-main); 
            margin: 0;
            padding: 40px 20px; 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container { 
            width: 100%;
            max-width: 900px; 
            margin: 0 auto; 
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            animation: fadeInDown 0.8s ease-out;
        }

        h1 { 
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #f43f5e, #fbbf24);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0 0 10px 0;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
            font-weight: 300;
        }

        .actions-panel {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-bottom: 30px;
            animation: fadeInUp 0.8s ease-out;
        }

        button { 
            background: linear-gradient(135deg, var(--primary), #e11d48);
            color: white; 
            border: none; 
            padding: 12px 24px; 
            border-radius: 8px; 
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer; 
            transition: transform 0.2s, box-shadow 0.2s, background 0.2s; 
            box-shadow: 0 4px 15px rgba(244, 63, 94, 0.3);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        button:hover { 
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(244, 63, 94, 0.5);
            background: linear-gradient(135deg, var(--primary-hover), #f43f5e);
        }

        button.btn-blue {
            background: linear-gradient(135deg, var(--secondary), #2563eb);
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
        }

        button.btn-blue:hover {
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.5);
            background: linear-gradient(135deg, #60a5fa, var(--secondary));
        }

        #resultado {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 20px;
            animation: fadeIn 0.5s ease-out;
            min-height: 200px;
        }

        .empty-state {
            text-align: center;
            color: var(--text-muted);
            font-style: italic;
            padding: 40px;
            background: var(--card-bg);
            border: 1px dashed var(--card-border);
            border-radius: 16px;
        }

        /* Success Card */
        .auth-card {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.3);
            border-radius: 16px;
            padding: 30px;
            text-align: center;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .auth-icon {
            font-size: 3rem;
            margin-bottom: 15px;
        }

        .auth-card h3 {
            color: var(--success);
            font-size: 1.5rem;
            margin: 0 0 10px 0;
        }

        /* Lists formatting */
        .section-title {
            color: #fbbf24;
            border-bottom: 1px solid rgba(251, 191, 36, 0.3);
            padding-bottom: 10px;
            margin-bottom: 20px;
            font-size: 1.3rem;
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .data-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 20px;
            transition: transform 0.3s ease, border-color 0.3s ease;
            animation: fadeInUp 0.5s ease-out both;
        }

        .data-card:hover {
            transform: translateY(-5px);
            border-color: rgba(255,255,255,0.3);
            background: rgba(30, 36, 60, 0.8);
        }

        .data-card h4 {
            margin: 0 0 10px 0;
            color: white;
            font-size: 1.1rem;
        }

        .data-card .tag {
            display: inline-block;
            background: rgba(59, 130, 246, 0.2);
            color: #60a5fa;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-top: 10px;
        }

        .price-tag {
            color: #f43f5e;
            font-size: 1.5rem;
            font-weight: 800;
            margin-top: 10px;
        }

        .loader {
            display: inline-block;
            width: 30px;
            height: 30px;
            border: 3px solid rgba(255,255,255,0.1);
            border-radius: 50%;
            border-top-color: var(--primary);
            animation: spin 1s ease-in-out infinite;
            margin: 20px auto;
        }

        .loader-container {
            text-align: center;
            width: 100%;
            padding: 40px;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes popIn { 0% { opacity: 0; transform: scale(0.9); } 100% { opacity: 1; transform: scale(1); } }

        /* Staggered animation delays for cards */
        .cards-grid .data-card:nth-child(1) { animation-delay: 0.1s; }
        .cards-grid .data-card:nth-child(2) { animation-delay: 0.2s; }
        .cards-grid .data-card:nth-child(3) { animation-delay: 0.3s; }
        .cards-grid .data-card:nth-child(4) { animation-delay: 0.4s; }

    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>PoliMarket</h1>
            <div class="subtitle">Terminal Avanzada de Operaciones</div>
        </div>
        
        <div class="actions-panel">
            <button id="btnAutorizar">
                <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>
                Autorizar Vendedor
            </button>
            <button id="btnCatalogo" class="btn-blue">
                <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
                Cargar Catálogo
            </button>
        </div>

        <div id="resultado">
            <div class="empty-state">
                El sistema está a la espera de peticiones. Haz clic en una de las acciones superiores para consultar la API en tiempo real.
            </div>
        </div>
    </div>

    <script>
        const resultadoDiv = document.getElementById('resultado');
        const API_BASE_URL = 'http://localhost:8080';

        function showLoading() {
            resultadoDiv.innerHTML = '<div class="loader-container"><div class="loader"></div><div style="color:var(--text-muted); margin-top:10px;">Conectando al servidor...</div></div>';
        }

        function showError(msg) {
            resultadoDiv.innerHTML = `
                <div class="auth-card" style="background: rgba(239, 68, 68, 0.1); border-color: rgba(239, 68, 68, 0.3);">
                    <div class="auth-icon" style="color:#ef4444;">⚠️</div>
                    <h3 style="color:#ef4444;">Error de Conexión</h3>
                    <p style="color:var(--text-muted);">${msg}</p>
                </div>`;
        }

        document.getElementById('btnAutorizar').addEventListener('click', async () => {
            try {
                showLoading();
                const res = await fetch(`${API_BASE_URL}/hr/autorizar`);
                const data = await res.json();
                
                if (data.autorizado) {
                    resultadoDiv.innerHTML = `
                        <div class="auth-card">
                            <div class="auth-icon">✅</div>
                            <h3>¡Autorización Exitosa!</h3>
                            <p style="color:var(--text-main); font-size:1.1rem;">${data.mensaje}</p>
                        </div>
                    `;
                }
            } catch (err) {
                showError(err.message);
            }
        });

        document.getElementById('btnCatalogo').addEventListener('click', async () => {
            try {
                showLoading();
                const res = await fetch(`${API_BASE_URL}/ventas/catalogo`);
                const data = await res.json();
                
                let htmlContent = '';
                
                // Productos Grid
                if (data.productos && data.productos.length > 0) {
                    htmlContent += '<h2 class="section-title">📦 Productos Activos</h2><div class="cards-grid">';
                    data.productos.forEach(p => {
                        htmlContent += `
                            <div class="data-card">
                                <h4>${p.nombre}</h4>
                                <div class="tag">ID: ${p.id}</div>
                                <div class="price-tag">$${p.precio.toFixed(2)}</div>
                            </div>
                        `;
                    });
                    htmlContent += '</div>';
                }

                // Clientes Grid
                if (data.clientes && data.clientes.length > 0) {
                    htmlContent += '<h2 class="section-title">👥 Directorio de Clientes</h2><div class="cards-grid">';
                    data.clientes.forEach(c => {
                        htmlContent += `
                            <div class="data-card">
                                <h4>${c.nombre}</h4>
                                <div class="tag">Cliente ID: ${c.id}</div>
                            </div>
                        `;
                    });
                    htmlContent += '</div>';
                }

                resultadoDiv.innerHTML = htmlContent;

            } catch (err) {
                showError(err.message);
            }
        });
    </script>
</body>
</html>
